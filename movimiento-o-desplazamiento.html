<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Movimiento o desplazamiento</title>
<style>
  body { font-family: Arial, sans-serif; color:#1f2937; margin:20px; }
  .box { max-width:900px; margin:auto; border:1px solid #ddd; border-radius:10px; padding:22px; }
  .escenario { background:#f3f4f6; padding:16px; border-radius:10px; margin:18px 0; }
  button { padding:10px 14px; margin:6px; border-radius:8px; border:1px solid #ccc; cursor:pointer; }
  button:hover { background:#e5e7eb; }
  .correcto { background:#dcfce7; border-left:5px solid #16a34a; padding:12px; margin-top:12px; }
  .incorrecto { background:#fee2e2; border-left:5px solid #dc2626; padding:12px; margin-top:12px; }
  canvas { width:100%; max-width:820px; border:1px solid #ccc; background:white; margin-top:18px; }
</style>
</head>

<body>
<div class="box">
  <h2>¿Movimiento sobre la curva o desplazamiento?</h2>

  <p>
    Lee el escenario y elige qué ocurre en el mercado. Luego observa el gráfico.
  </p>

  <div class="escenario">
    <h3 id="tituloCaso">Caso</h3>
    <p id="textoCaso"></p>

    <button onclick="responder('movimiento')">Movimiento sobre la curva</button>
    <button onclick="responder('demanda')">Desplazamiento de la demanda</button>
    <button onclick="responder('oferta')">Desplazamiento de la oferta</button>
    <button onclick="nuevoCaso()">Nuevo caso</button>

    <div id="retro"></div>
  </div>

  <canvas id="grafico" width="820" height="520"></canvas>
</div>

<script>
const casos = [
  {
    titulo: "El precio de las paltas aumenta",
    texto: "Supón que sube el precio de las paltas, sin que cambien otros factores.",
    respuesta: "movimiento",
    explicacion: "Es un movimiento sobre la curva de demanda: cambia la cantidad demandada porque cambió el precio del mismo bien.",
    grafico: "movimientoDemanda"
  },
  {
    titulo: "Las paltas se vuelven más populares",
    texto: "Una campaña en redes sociales hace que más personas quieran consumir paltas.",
    respuesta: "demanda",
    explicacion: "Es un desplazamiento de la demanda hacia la derecha: a cada precio, los consumidores quieren comprar más.",
    grafico: "demandaDerecha"
  },
  {
    titulo: "Una sequía reduce la producción de paltas",
    texto: "Los productores tienen menos disponibilidad para vender paltas.",
    respuesta: "oferta",
    explicacion: "Es un desplazamiento de la oferta hacia la izquierda: a cada precio, los productores ofrecen menos.",
    grafico: "ofertaIzquierda"
  },
  {
    titulo: "Baja el precio del pan",
    texto: "El precio del pan baja, sin cambios en ingresos, gustos ni costos.",
    respuesta: "movimiento",
    explicacion: "Es un movimiento sobre la curva de demanda: al bajar el precio, aumenta la cantidad demandada.",
    grafico: "movimientoDemanda"
  },
  {
    titulo: "Sube el costo de producir completos",
    texto: "Aumenta el precio de los insumos para producir completos.",
    respuesta: "oferta",
    explicacion: "Es un desplazamiento de la oferta hacia la izquierda: producir se vuelve más caro.",
    grafico: "ofertaIzquierda"
  }
];

let casoActual = 0;

const canvas = document.getElementById("grafico");
const ctx = canvas.getContext("2d");

const L = 90, R = 760, T = 55, B = 440;

function x(q) { return L + q * (R - L) / 100; }
function y(p) { return B - p * (B - T) / 100; }

function mostrarCaso() {
  document.getElementById("tituloCaso").textContent = casos[casoActual].titulo;
  document.getElementById("textoCaso").textContent = casos[casoActual].texto;
  document.getElementById("retro").innerHTML = "";
  dibujarBase();
}

function nuevoCaso() {
  casoActual = Math.floor(Math.random() * casos.length);
  mostrarCaso();
}

function responder(opcion) {
  const caso = casos[casoActual];
  const retro = document.getElementById("retro");

  if (opcion === caso.respuesta) {
    retro.className = "correcto";
    retro.innerHTML = "<strong>Correcto.</strong> " + caso.explicacion;
  } else {
    retro.className = "incorrecto";
    retro.innerHTML = "<strong>No exactamente.</strong> " + caso.explicacion;
  }

  dibujarResultado(caso.grafico);
}

function ejes() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "#111827";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(L,B);
  ctx.lineTo(R,B);
  ctx.moveTo(L,B);
  ctx.lineTo(L,T);
  ctx.stroke();

  ctx.fillStyle = "#111827";
  ctx.font = "16px Arial";
  ctx.fillText("Cantidad", R - 75, B + 35);
  ctx.fillText("Precio", L - 65, T + 10);
}

function demanda(color="#2563eb", desplazamiento=0, etiqueta="D") {
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x(15 + desplazamiento), y(85));
  ctx.lineTo(x(85 + desplazamiento), y(20));
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.font = "18px Arial";
  ctx.fillText(etiqueta, x(86 + desplazamiento), y(22));
}

function oferta(color="#16a34a", desplazamiento=0, etiqueta="O") {
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x(15 + desplazamiento), y(20));
  ctx.lineTo(x(85 + desplazamiento), y(85));
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.font = "18px Arial";
  ctx.fillText(etiqueta, x(86 + desplazamiento), y(83));
}

function punto(q,p,color,label) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x(q), y(p), 7, 0, Math.PI * 2);
  ctx.fill();

  ctx.font = "15px Arial";
  ctx.fillText(label, x(q)+10, y(p)-8);
}

function flecha(q1,p1,q2,p2,color="#374151") {
  const x1 = x(q1), y1 = y(p1), x2 = x(q2), y2 = y(p2);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  const ang = Math.atan2(y2-y1, x2-x1);
  const h = 10;

  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2 - h*Math.cos(ang - Math.PI/6), y2 - h*Math.sin(ang - Math.PI/6));
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2 - h*Math.cos(ang + Math.PI/6), y2 - h*Math.sin(ang + Math.PI/6));
  ctx.stroke();
}

function dibujarBase() {
  ejes();
  demanda("#2563eb", 0, "D");
  oferta("#16a34a", 0, "O");
  punto(50,52,"#111827","E");
  ctx.fillStyle = "#111827";
  ctx.font = "17px Arial";
  ctx.fillText("Situación inicial del mercado", 300, 35);
}

function dibujarResultado(tipo) {
  ejes();

  if (tipo === "movimientoDemanda") {
    demanda("#2563eb", 0, "D");
    oferta("#16a34a", 0, "O");
    punto(42,60,"#2563eb","A");
    punto(58,45,"#dc2626","B");
    flecha(42,60,58,45);
    ctx.fillText("Cambio en cantidad demandada: movimiento sobre D", 230, 35);
  }

  if (tipo === "demandaDerecha") {
    demanda("#2563eb", 0, "D₀");
    demanda("#dc2626", 15, "D₁");
    oferta("#16a34a", 0, "O");
    punto(50,52,"#2563eb","E₀");
    punto(58,60,"#dc2626","E₁");
    flecha(50,52,58,60);
    ctx.fillText("La demanda se desplaza hacia la derecha", 260, 35);
  }

  if (tipo === "ofertaIzquierda") {
    demanda("#2563eb", 0, "D");
    oferta("#16a34a", 0, "O₀");
    oferta("#dc2626", -15, "O₁");
    punto(50,52,"#16a34a","E₀");
    punto(42,60,"#dc2626","E₁");
    flecha(50,52,42,60);
    ctx.fillText("La oferta se desplaza hacia la izquierda", 260, 35);
  }
}

nuevoCaso();
</script>
</body>
</html>
